<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭遊戲 🎉</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap');

  :root {
    --red: #7B2FBE;
    --red-dark: #4A1080;
    --red-light: #A855F7;
    --gold: #C084FC;
    --gold-dark: #9333EA;
    --gold-light: #E9D5FF;
    --cream: #F5F3FF;
    --bg: #050008;
    --card-bg: #0D0018;
    --text: #FFFFFF;
    --text-dim: #C4B5FD;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(123,47,190,0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(5,0,8,1) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .confetti-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .confetti-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  #app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  /* ---- HEADER ---- */
  .header {
    text-align: center;
    margin-bottom: 30px;
    animation: fadeDown 0.8s ease;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    line-height: 1.1;
    letter-spacing: 0.05em;
  }

  .header-sub {
    font-size: 1rem;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 0.1em;
  }

  .lantern-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 10px;
    font-size: 2rem;
  }

  .lantern-row span {
    animation: swing 2s ease-in-out infinite alternate;
    display: inline-block;
  }
  .lantern-row span:nth-child(2) { animation-delay: 0.3s; }
  .lantern-row span:nth-child(3) { animation-delay: 0.6s; }

  @keyframes swing {
    from { transform: rotate(-8deg); }
    to { transform: rotate(8deg); }
  }

  /* ---- SCREENS ---- */
  .screen { display: none; width: 100%; max-width: 700px; animation: fadeIn 0.5s ease; }
  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- SETUP SCREEN ---- */
  .setup-card {
    background: linear-gradient(145deg, #0D0018, #050008);
    border: 1px solid rgba(168,85,247,0.3);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(168,85,247,0.2);
  }

  .setup-card h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.4rem;
    color: var(--gold);
    margin-bottom: 20px;
    text-align: center;
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
  }

  label {
    color: var(--gold-light);
    font-size: 0.9rem;
    white-space: nowrap;
    font-weight: 700;
  }

  input[type="number"], input[type="text"] {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(245,197,24,0.4);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1rem;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="number"] { width: 90px; }

  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(245,197,24,0.15);
  }

  .names-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }

  .name-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .name-emoji {
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  /* ---- BUTTONS ---- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    font-weight: 700;
    transition: all 0.2s ease;
    letter-spacing: 0.05em;
  }

  .btn-gold {
    background: linear-gradient(135deg, #C084FC, #A855F7, #7B2FBE);
    color: #FFFFFF;
    box-shadow: 0 4px 20px rgba(168,85,247,0.4);
  }

  .btn-gold:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(168,85,247,0.6);
  }

  .btn-red {
    background: linear-gradient(135deg, var(--red-light), var(--red), var(--red-dark));
    color: #FFFFFF;
    box-shadow: 0 4px 20px rgba(123,47,190,0.4);
  }

  .btn-red:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(123,47,190,0.6);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .btn-ghost:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text);
    border-color: rgba(255,255,255,0.3);
  }

  .btn-center { display: flex; justify-content: center; }

  /* ---- GAME SCREEN ---- */
  .game-header {
    text-align: center;
    margin-bottom: 24px;
  }

  .game-header h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.6rem;
    color: var(--gold);
  }

  .round-badge {
    display: inline-block;
    background: var(--red);
    color: var(--gold-light);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 20px;
    margin-top: 6px;
    letter-spacing: 0.1em;
  }

  /* ---- CARDS ---- */
  .cards-arena {
    position: relative;
    margin-bottom: 30px;
  }

  .cards-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
  }

  .player-card {
    width: 110px;
    height: 140px;
    border-radius: 14px;
    background: linear-gradient(145deg, #1A003D, #0D0018);
    border: 2px solid rgba(245,197,24,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: default;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .player-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 8px,
        rgba(168,85,247,0.03) 8px,
        rgba(168,85,247,0.03) 9px
      );
  }

  .player-card .card-emoji {
    font-size: 2rem;
    position: relative;
    z-index: 1;
  }

  .player-card .card-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--gold-light);
    text-align: center;
    padding: 0 6px;
    position: relative;
    z-index: 1;
  }

  .player-card .card-count {
    font-size: 0.7rem;
    color: var(--text-dim);
    position: relative;
    z-index: 1;
  }

  /* Hover frame animation */
  .frame-overlay {
    position: absolute;
    pointer-events: none;
    border: 3px solid var(--gold);
    border-radius: 16px;
    box-shadow: 0 0 20px rgba(245,197,24,0.8), inset 0 0 20px rgba(245,197,24,0.1);
    transition: none;
    z-index: 10;
    animation: framePulse 0.4s ease-in-out infinite alternate;
  }

  @keyframes framePulse {
    from { box-shadow: 0 0 15px rgba(168,85,247,0.6), inset 0 0 10px rgba(168,85,247,0.1); }
    to { box-shadow: 0 0 35px rgba(192,132,252,1), inset 0 0 20px rgba(168,85,247,0.2); border-color: var(--gold-light); }
  }

  .player-card.is-winner {
    border-color: var(--gold);
    background: linear-gradient(145deg, #2D0060, #1A003D);
    animation: winnerPop 0.5s ease;
    box-shadow: 0 0 30px rgba(168,85,247,0.5);
    transform: scale(1.08);
  }

  @keyframes winnerPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1.08); }
  }

  /* ---- TASK REVEAL ---- */
  .task-panel {
    background: linear-gradient(145deg, #2D0060, #1A003D);
    border: 2px solid rgba(245,197,24,0.4);
    border-radius: 20px;
    padding: 28px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(123,47,190,0.3);
    margin-bottom: 20px;
    animation: slideUp 0.5s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .winner-announce {
    font-size: 1rem;
    color: var(--text-dim);
    margin-bottom: 8px;
    letter-spacing: 0.1em;
  }

  .winner-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .game-badge {
    display: inline-block;
    background: rgba(245,197,24,0.15);
    border: 1px solid var(--gold-dark);
    color: var(--gold-light);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 4px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 0.1em;
  }

  .task-word {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 900;
    color: var(--gold-light);
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 10px 0;
    letter-spacing: 0.1em;
  }

  .task-desc {
    font-size: 0.9rem;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .task-hint {
    font-size: 0.85rem;
    color: rgba(245,197,24,0.6);
    margin-top: 8px;
    font-style: italic;
  }

  /* Animal sound options */
  .animal-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 12px 0;
  }

  .animal-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(245,197,24,0.25);
    border-radius: 30px;
    padding: 6px 16px;
    font-size: 0.9rem;
    color: var(--text-dim);
  }

  /* Tongue twisters */
  .twist-text {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: var(--gold-light);
    line-height: 1.8;
    margin: 12px 0;
    padding: 16px;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    border-left: 4px solid var(--gold);
  }

  /* ---- CONTROLS ---- */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  /* ---- WRAP UP ---- */
  .wrapup-card {
    background: linear-gradient(145deg, #0D0018, #050008);
    border: 2px solid var(--gold-dark);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
  }

  .wrapup-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .wrapup-subtitle {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }

  .unlucky-crown {
    font-size: 3rem;
    margin-bottom: 10px;
    animation: bounce 1s ease infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .unlucky-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--red-light);    margin-bottom: 4px;
  }

  .unlucky-label {
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .stats-list {
    list-style: none;
    margin-bottom: 24px;
    text-align: left;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
  }

  .stats-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
  }

  .stats-list li.top {
    background: rgba(123,47,190,0.25);
    border-color: rgba(168,85,247,0.5);
  }

  .stat-name { font-weight: 700; font-size: 1rem; color: var(--gold-light); }
  .stat-count {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--gold);
  }

  /* Stars particles */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    font-size: 1.2rem;
    animation: sparkleOut 1s ease forwards;
  }

  @keyframes sparkleOut {
    0% { opacity: 1; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.5) rotate(180deg); }
    100% { opacity: 0; transform: scale(0) rotate(360deg) translateY(-60px); }
  }

  /* ---- DIVIDER ---- */
  .gold-divider {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
    margin: 20px 0;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .player-card { width: 90px; height: 120px; }
    .player-card .card-emoji { font-size: 1.6rem; }
    .player-card .card-name { font-size: 0.8rem; }
  }

  /* Overlay for "eyes closed" */
  .eyes-closed-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    animation: fadeIn 0.3s ease;
  }

  .eyes-closed-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    text-align: center;
    padding: 0 20px;
  }

  .eyes-closed-sub {
    color: var(--text-dim);
    text-align: center;
    padding: 0 20px;
    font-size: 1.1rem;
  }
</style>
</head>
<body>

<div class="confetti-bg" id="confettiBg"></div>

<div id="app">
  <div class="header">
    <div class="lantern-row">
      <span>🏮</span><span>🎊</span><span>🏮</span>
    </div>
    <div class="header-title">家庭遊戲</div>
    <div class="header-sub">Family Party Games · Lucky Draw</div>
  </div>

  <!-- SETUP SCREEN -->
  <div class="screen active" id="screenSetup">
    <div class="setup-card">
      <h2>👨‍👩‍👧‍👦 設定家庭成員</h2>
      <div class="input-row">
        <label>人數：</label>
        <input type="number" id="memberCount" min="2" max="12" value="4" />
        <button class="btn btn-ghost" onclick="generateNameInputs()">確定</button>
      </div>
      <div class="names-grid" id="namesGrid"></div>
      <div class="btn-center">
        <button class="btn btn-gold" onclick="startGame()">🎲 開始遊戲！</button>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="screenGame">
    <div class="game-header">
      <h2>🎰 幸運抽獎</h2>
      <div class="round-badge" id="roundBadge">第 1 輪</div>
    </div>

    <div class="cards-arena" id="cardsArena">
      <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <div id="taskPanel"></div>

    <div class="controls" id="gameControls">
      <button class="btn btn-gold" id="drawBtn" onclick="startDraw()">🎲 開始抽獎！</button>
      <button class="btn btn-ghost" onclick="endSession()">🏁 結束遊戲</button>
    </div>
  </div>

  <!-- WRAPUP SCREEN -->
  <div class="screen" id="screenWrapup">
    <div class="wrapup-card">
      <div class="wrapup-title">🎊 遊戲結束！</div>
      <div class="wrapup-subtitle">感謝大家參與！</div>
      <div class="gold-divider"></div>
      <div class="unlucky-crown">👑</div>
      <div id="unluckyName" class="unlucky-name"></div>
      <div class="unlucky-label">最不幸運的人 · Most Drawn</div>
      <div class="gold-divider"></div>
      <ul class="stats-list" id="statsList"></ul>
      <button class="btn btn-gold" onclick="resetGame()">🔄 再玩一次</button>
    </div>
  </div>
</div>

<!-- Eyes Closed Overlay -->
<div class="eyes-closed-overlay" id="eyesOverlay" style="display:none;">
  <div style="font-size:4rem">😴</div>
  <div class="eyes-closed-text" id="overlayWinner"></div>
  <div class="eyes-closed-sub">其他人請閉眼！<br>Other members, please close your eyes!</div>
  <button class="btn btn-gold" id="overlayRevealBtn" onclick="revealTask()">我知道了，準備好了！</button>
</div>

<script>
// ===== DATA =====
const IDIOMS = [
  '一箭雙鵰','一毛不拔','義無反顧','聲東擊西',
  '捧腹大笑','破涕而笑','痛哭流涕','欲哭無淚',
  '傾盆大雨','七嘴八舌','九牛一毛'
];

const TONGUE_TWISTERS = [
  { text: '四是四，十是十，\n十四是十四，\n四十是四十。', desc: '挑戰：快速說三次！' },
  { text: '吃葡萄不吐葡萄皮，\n不吃葡萄倒吐葡萄皮。', desc: '挑戰：速度越快越好！' },
  { text: '黑化肥發灰，\n灰化肥發黑。', desc: '挑戰：不停說，不出錯！' },
  { text: '扁擔長，板凳寬，\n扁擔沒有板凳寬，\n板凳沒有扁擔長。', desc: '挑戰：快速不犯錯！' },
  { text: '山前有個崔粗腿，\n山後有個崔腿粗，\n崔粗腿打崔腿粗。', desc: '挑戰：連說三次！' },
  { text: '紅鳳凰，粉鳳凰，\n紅粉鳳凰，黃鳳凰。', desc: '挑戰：速度要快！' },
];

const ANIMALS = [
  { emoji: '🐄', name: '牛', hint: '牛叫的聲音' },
  { emoji: '🦉', name: '貓頭鷹', hint: '深夜的叫聲' },
  { emoji: '🐘', name: '象', hint: '受驚嚇時' },
  { emoji: '🦭', name: '海豹', hint: '要食物時' },
  { emoji: '🦛', name: '河馬', hint: '叫聲模仿' },
  { emoji: '🦜', name: '鸚鵡', hint: '學人說話' },
  { emoji: '🐊', name: '鱷魚', hint: '嘶嘶聲' },
  { emoji: '🐴', name: '馬 Horse', hint: '不滿時叫' },
  { emoji: '🐧', name: '企鵝', hint: '開心叫聲' },
  { emoji: '🦦', name: '水獺', hint: '開心叫聲' },
];

// ===== STATE =====
let members = [];
let drawCounts = {};
let round = 0;
let currentWinner = null;
let currentGame = null;
let isDrawing = false;
let frameEl = null;
let frameInterval = null;

const MEMBER_EMOJIS = ['👴','👵','👨','👩','🧑','👦','👧','🧒','🧓','👱','🧔','👨‍🦱'];
const COLORS = ['#E8453C','#F5C518','#4CAF50','#2196F3','#9C27B0','#FF9800','#00BCD4','#FF4081','#69F0AE','#40C4FF','#CE93D8','#FFCC02'];

// ===== SETUP =====
function generateNameInputs() {
  const count = parseInt(document.getElementById('memberCount').value) || 4;
  const grid = document.getElementById('namesGrid');
  grid.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'name-input-wrap';
    wrap.innerHTML = `
      <span class="name-emoji">${MEMBER_EMOJIS[i % MEMBER_EMOJIS.length]}</span>
      <input type="text" placeholder="成員 ${i+1}" id="name_${i}" />
    `;
    grid.appendChild(wrap);
  }
}

function startGame() {
  const count = parseInt(document.getElementById('memberCount').value) || 4;
  members = [];
  for (let i = 0; i < count; i++) {
    const inp = document.getElementById(`name_${i}`);
    const name = inp ? (inp.value.trim() || `成員${i+1}`) : `成員${i+1}`;
    members.push({ name, emoji: MEMBER_EMOJIS[i % MEMBER_EMOJIS.length], color: COLORS[i % COLORS.length] });
    drawCounts[name] = 0;
  }
  round = 0;
  showScreen('screenGame');
  buildCards();
  document.getElementById('taskPanel').innerHTML = '';
  document.getElementById('drawBtn').disabled = false;
  startConfetti();
}

function buildCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  members.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'player-card';
    card.id = `card_${i}`;
    card.innerHTML = `
      <div class="card-emoji">${m.emoji}</div>
      <div class="card-name">${m.name}</div>
      <div class="card-count">抽中 <span id="cnt_${i}">${drawCounts[m.name]}</span> 次</div>
    `;
    grid.appendChild(card);
  });
}

// ===== LUCKY DRAW =====
function startDraw() {
  if (isDrawing) return;
  isDrawing = true;
  document.getElementById('drawBtn').disabled = true;
  document.getElementById('taskPanel').innerHTML = '';
  // remove winner highlight
  document.querySelectorAll('.player-card').forEach(c => c.classList.remove('is-winner'));

  // create frame
  if (frameEl) frameEl.remove();
  frameEl = document.createElement('div');
  frameEl.className = 'frame-overlay';
  document.getElementById('cardsArena').appendChild(frameEl);

  round++;
  document.getElementById('roundBadge').textContent = `第 ${round} 輪`;

  let idx = 0;
  const totalFrames = 30 + Math.floor(Math.random() * 20);
  let frame = 0;

  function hop() {
    moveFrameToCard(idx);
    idx = (idx + 1) % members.length;
    frame++;
    const delay = frame < totalFrames * 0.5 ? 80 :
                  frame < totalFrames * 0.8 ? 150 :
                  frame < totalFrames * 0.95 ? 250 : 400;

    if (frame < totalFrames) {
      frameInterval = setTimeout(hop, delay);
    } else {
      // pick winner
      const winIdx = Math.floor(Math.random() * members.length);
      moveFrameToCard(winIdx);
      currentWinner = members[winIdx];
      drawCounts[currentWinner.name]++;
      document.getElementById(`cnt_${winIdx}`).textContent = drawCounts[currentWinner.name];
      document.getElementById(`card_${winIdx}`).classList.add('is-winner');
      isDrawing = false;
      showSparkles();
      setTimeout(() => showEyesOverlay(winIdx), 600);
    }
  }
  hop();
}

function moveFrameToCard(idx) {
  const card = document.getElementById(`card_${idx}`);
  const arena = document.getElementById('cardsArena');
  const cardRect = card.getBoundingClientRect();
  const arenaRect = arena.getBoundingClientRect();
  frameEl.style.left = (cardRect.left - arenaRect.left - 4) + 'px';
  frameEl.style.top = (cardRect.top - arenaRect.top - 4) + 'px';
  frameEl.style.width = (cardRect.width + 8) + 'px';
  frameEl.style.height = (cardRect.height + 8) + 'px';
}

function showEyesOverlay(winIdx) {
  const game = pickGame();
  currentGame = game;
  const overlay = document.getElementById('eyesOverlay');
  document.getElementById('overlayWinner').textContent = `🎉 ${currentWinner.name} 被抽中！`;
  overlay.style.display = 'flex';
}

function pickGame() {
  const games = [1, 2, 3];
  return games[Math.floor(Math.random() * games.length)];
}

function revealTask() {
  document.getElementById('eyesOverlay').style.display = 'none';
  if (frameEl) { frameEl.remove(); frameEl = null; }
  showTask();
}

// ===== TASK DISPLAY =====
function showTask() {
  const panel = document.getElementById('taskPanel');
  let html = `
    <div class="task-panel">
      <div class="winner-announce">🎉 本輪幸運兒</div>
      <div class="winner-name">${currentWinner.emoji} ${currentWinner.name}</div>
  `;

  if (currentGame === 1) {
    const idiom = IDIOMS[Math.floor(Math.random() * IDIOMS.length)];
    html += `
      <div class="game-badge">🎭 遊戲一：成語表演</div>
      <div class="task-word">${idiom}</div>
      <div class="task-desc">用肢體動作演出這個成語<br>其他家人猜猜看！</div>
      <div class="task-hint">💡 Act it out without words or sounds!</div>
    `;
  } else if (currentGame === 2) {
    const twist = TONGUE_TWISTERS[Math.floor(Math.random() * TONGUE_TWISTERS.length)];
    html += `
      <div class="game-badge">👅 遊戲二：急口令</div>
      <div class="twist-text">${twist.text.replace(/\n/g,'<br>')}</div>
      <div class="task-desc">${twist.desc}</div>
      <div class="task-hint">💡 Say it fast without making mistakes!</div>
    `;
  } else {
    const animal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
    html += `
      <div class="game-badge">🐾 遊戲三：動物叫聲</div>
      <div style="font-size:3.5rem;margin:10px 0">${animal.emoji}</div>
      <div class="task-desc">模仿這個動物的叫聲<br>其他人猜是什麼動物！</div>
      <div class="task-hint">💡 ${animal.hint}</div>
    `;
  }

  html += `</div>`;
  panel.innerHTML = html;

  document.getElementById('drawBtn').disabled = false;
  document.getElementById('drawBtn').textContent = '🎲 再抽一次！';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===== WRAP UP =====
function endSession() {
  showScreen('screenWrapup');

  // find unluckiest
  let maxCount = 0;
  let unluckiest = '';
  members.forEach(m => {
    if (drawCounts[m.name] > maxCount) {
      maxCount = drawCounts[m.name];
      unluckiest = m.name;
    }
  });

  document.getElementById('unluckyName').textContent = unluckiest || members[0]?.name || '—';

  // sort stats
  const sorted = [...members].sort((a, b) => drawCounts[b.name] - drawCounts[a.name]);
  const list = document.getElementById('statsList');
  list.innerHTML = sorted.map((m, i) => `
    <li class="${i === 0 ? 'top' : ''}">
      <span class="stat-name">${m.emoji} ${m.name} ${i === 0 ? '👑' : ''}</span>
      <span class="stat-count">${drawCounts[m.name]} 次</span>
    </li>
  `).join('');

  showSparkles();
}

function resetGame() {
  drawCounts = {};
  round = 0;
  showScreen('screenSetup');
  stopConfetti();
}

// ===== UTILITIES =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showSparkles() {
  const emojis = ['✨','🌟','⭐','🎊','🎉','💫','🌠'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 90 + 5 + 'vw';
      el.style.top = Math.random() * 80 + 10 + 'vh';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }, i * 80);
  }
}

// Confetti
let confettiInterval;
function startConfetti() {
  const bg = document.getElementById('confettiBg');
  bg.innerHTML = '';
  const colors = ['#A855F7','#7B2FBE','#C084FC','#E9D5FF','#fff','#6D28D9','#DDD6FE','#4C1D95'];
  for (let i = 0; i < 25; i++) {
    const dot = document.createElement('div');
    dot.className = 'confetti-dot';
    dot.style.left = Math.random() * 100 + 'vw';
    dot.style.background = colors[Math.floor(Math.random() * colors.length)];
    dot.style.animationDuration = (6 + Math.random() * 8) + 's';
    dot.style.animationDelay = (Math.random() * 8) + 's';
    dot.style.width = dot.style.height = (4 + Math.random() * 6) + 'px';
    bg.appendChild(dot);
  }
}

function stopConfetti() {
  document.getElementById('confettiBg').innerHTML = '';
}

// ===== INIT =====
generateNameInputs();
</script>
</body>
</html>
